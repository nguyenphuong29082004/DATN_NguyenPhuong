<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Catwalk.AI - Revolutionary AI-powered fashion photography and modeling platform. Create stunning AI models, virtual try-on experiences, and professional content for brands." />
  <meta name="keywords"
    content="AI fashion, virtual try-on, AI models, fashion photography, AI photo shoot, catwalk, modeling platform, AI content generation" />
  <meta name="author" content="Catwalk.AI" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://catwalk.ai/" />
  <meta property="og:title" content="Catwalk.AI - AI-Powered Fashion Photography" />
  <meta property="og:description"
    content="Revolutionary AI-powered fashion photography and modeling platform. Create stunning AI models and professional content." />
  <meta property="og:image" content="https://catwalk.ai/og-image.jpg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://catwalk.ai/" />
  <meta property="twitter:title" content="Catwalk.AI - AI-Powered Fashion Photography" />
  <meta property="twitter:description" content="Revolutionary AI-powered fashion photography and modeling platform." />
  <meta property="twitter:image" content="https://catwalk.ai/og-image.jpg" />

  <!-- DNS Prefetch & Preconnect for faster font loading -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts: Inter and Cormorant Garamond -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Material Symbols Outlined with full weight/fill range -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <title>Catwalk.AI - The Future of Fashion Modelling</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Inline critical CSS for faster FCP -->
  <style>
    /* Critical CSS - Above the fold */
    :root {
      --primary: #F1E0B6;
      --background-dark: #0a0a0a;
      --text-primary: #ffffff;
    }

    html {
      background-color: #0a0a0a;
    }

    body {
      margin: 0;
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Epilogue', system-ui, -apple-system, sans-serif;
    }

    #root {
      min-height: 100vh;
    }

    /* Loading state */
    .loading-skeleton {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #F1E0B6;
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Initial Loading State -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0a0a0a; color: #F1E0B6; font-family: 'Inter', sans-serif;">
      <div class="spinner-load" style="width: 40px; height: 40px; border: 2px solid rgba(241, 224, 182, 0.1); border-top-color: #F1E0B6; border-radius: 50%; animation: spin-load 0.8s linear infinite;"></div>
      <style>
        @keyframes spin-load { to { transform: rotate(360deg); } }
      </style>
      <h1 style="margin-top: 24px; font-size: 14px; font-weight: 400; letter-spacing: 0.1em; opacity: 0.8; text-transform: uppercase;">Catwalk.AI</h1>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
